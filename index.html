    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-button menu-button" type="button" aria-label="我的">
            <svg><use href="#icon-list"></use></svg>
          </button>
          <button class="period-pill" type="button" aria-label="按月查看">月</button>
        </div>
        <div class="month-selector" aria-label="月份切换">
          <button class="month-arrow" id="prevMonth" aria-label="上个月">
            <svg><use href="#icon-left"></use></svg>
          </button>
          <strong id="monthTitle">本月</strong>
          <svg class="down-icon"><use href="#icon-down"></use></svg>
          <button class="month-arrow" id="nextMonth" aria-label="下个月">
            <svg><use href="#icon-right"></use></svg>
          </button>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" type="button" data-jump-view="insights" aria-label="分析提醒">
            <svg><use href="#icon-bell"></use></svg>
          </button>
          <button class="icon-button" type="button" aria-label="日历">
            <svg><use href="#icon-calendar"></use></svg>
          </button>
        </div>
      </header>

      <main class="content">
        <section class="view active" id="view-overview" data-view-panel="overview">
          <section class="month-ledger" aria-label="月度收支">
            <button class="month-total expense-total" type="button" data-jump-view="insights">
              <span>月支出</span>
              <svg><use href="#icon-right"></use></svg>
              <strong id="expenseTotal">¥0</strong>
            </button>
            <button class="month-total income-total" type="button" data-jump-view="insights">
              <span>月收入</span>
              <svg><use href="#icon-right"></use></svg>
              <strong id="incomeTotal">¥0</strong>
            </button>
          </section>

          <section class="spend-stage" aria-labelledby="balanceLabel">
            <div class="spend-orbit">
              <div class="saving-ring" id="savingRing" aria-label="支出占预算">
                <div class="spend-core">
                  <svg class="coin-icon"><use href="#icon-coin"></use></svg>
                  <div>
                    <span id="balanceLabel">支出</span>
                    <svg><use href="#icon-eye"></use></svg>
                  </div>
                  <strong id="netBalance">¥0</strong>
                  <small id="savingRate">预算 0%</small>
                </div>
              </div>
            </div>
            <div class="pager-dots" aria-hidden="true">
              <span class="active"></span>
              <span></span>
            </div>
          </section>

          <section class="list-section daily-ledger" aria-labelledby="recentTitle">
            <div class="transaction-list compact" id="recentList"></div>
          </section>

          <section class="budget-tool compact-tool compact-budget" aria-label="预算">
            <div class="section-title">
              <div>
                <span>预算</span>
                <strong id="budgetText">¥0</strong>
              </div>
              <span id="budgetState">稳定</span>
            </div>
            <input id="budgetRange" type="range" min="1000" max="30000" step="100">
            <div class="budget-line">
              <span id="budgetProgress">0%</span>
              <input id="budgetInput" type="number" min="0" step="100" inputmode="numeric" aria-label="月预算">
            </div>
          </section>

          <strong id="budgetLeft" hidden>¥0</strong>

          <section class="quick-categories compact-tool compact-categories" aria-labelledby="quickTitle">
            <div class="section-title">
              <div>
                <span>常用分类</span>
                <strong id="quickTitle">支出结构</strong>
              </div>
            </div>
            <div class="category-strip" id="topCategories"></div>
          </section>
        </section>

        <section class="view" id="view-insights" data-view-panel="insights">
          <header class="analysis-top">
            <button class="analysis-back" type="button" data-view="overview" aria-label="返回总览">
              <svg><use href="#icon-left"></use></svg>
            </button>
            <div>
              <span id="analysisMonthTitle">本月</span>
              <strong>收支分析</strong>
            </div>
          </header>

          <section class="analysis-summary" aria-label="收支概览">
            <div class="analysis-metric expense">
              <span>支出</span>
              <strong id="analysisExpenseTotal">¥0</strong>
            </div>
            <div class="analysis-metric income">
              <span>收入</span>
              <strong id="analysisIncomeTotal">¥0</strong>
            </div>
            <div class="analysis-metric balance">
              <span>结余</span>
              <strong id="analysisNetTotal">¥0</strong>
            </div>
          </section>

          <section class="chart-panel" aria-labelledby="chartTitle">
            <div class="section-title">
              <div>
                <span>分析</span>
                <strong id="chartTitle">分类占比</strong>
              </div>
              <span id="chartTotal">¥0</span>
            </div>
            <canvas id="categoryChart" width="320" height="220"></canvas>
          </section>

          <section class="trend-panel" aria-labelledby="trendTitle">
            <div class="section-title">
              <div>
                <span>趋势</span>
                <strong id="trendTitle">最近 7 天</strong>
              </div>
            </div>
            <div class="trend-bars" id="trendBars"></div>
          </section>

          <section class="category-breakdown" aria-labelledby="breakdownTitle">
            <div class="section-title">
              <div>
                <span>明细</span>
                <strong id="breakdownTitle">支出排行</strong>
              </div>
            </div>
            <div id="breakdownList"></div>
          </section>
        </section>
      </main>

      <button class="fab" id="openComposer" aria-label="记一笔">
        <svg><use href="#icon-plus"></use></svg>
      </button>
    </div>

    <section class="sheet" id="composerSheet" aria-hidden="true" aria-labelledby="composerTitle">
      <div class="sheet-backdrop" data-close-sheet></div>
      <form class="sheet-panel composer-panel" id="entryForm">
        <header class="sheet-header">
          <div>
            <span>流水</span>
            <strong id="composerTitle">记一笔</strong>
          </div>
          <button class="icon-button" type="button" data-close-sheet aria-label="关闭">
            <svg><use href="#icon-close"></use></svg>
          </button>
        </header>

        <div class="segmented entry-type" role="tablist" aria-label="收支类型">
          <button class="active" type="button" data-entry-type="expense">支出</button>
          <button type="button" data-entry-type="income">收入</button>
        </div>

        <div class="composer-scroll-layer">
          <div class="category-section">
            <div class="composer-category-tabs" id="composerCategoryTabs" aria-label="分类分组"></div>
            <div class="category-section-head">
              <span>选择分类</span>
              <button class="icon-button category-manage-button" id="openCategoryManager" type="button" aria-label="管理快捷">
                <svg><use href="#icon-settings"></use></svg>
              </button>
            </div>
            <div class="category-picker" id="categoryPicker" aria-label="选择分类"></div>
          </div>
        </div>

        <div class="composer-fixed-layer">
          <div class="form-grid composer-meta">
            <label class="amount-field composer-amount">
              <span>金额</span>
              <input id="amountInput" name="amount" type="text" inputmode="none" placeholder="0.00" readonly required>
            </label>
            <label>
              <span>备注</span>
              <button class="note-trigger" id="noteTrigger" type="button" aria-label="编辑备注">
                <span id="notePreview">可选</span>
              </button>
              <input id="noteInput" name="note" type="hidden">
            </label>
          </div>

          <div class="composer-keypad" id="composerKeypad" aria-label="数字键盘">
            <button type="button" data-key="1">1</button>
            <button type="button" data-key="2">2</button>
            <button type="button" data-key="3">3</button>
            <button type="button" data-key="back" aria-label="退格">
              <svg><use href="#icon-backspace"></use></svg>
            </button>
            <button type="button" data-key="4">4</button>
            <button type="button" data-key="5">5</button>
            <button type="button" data-key="6">6</button>
            <button type="button" id="resetForm" data-key="clear">清空</button>
            <button type="button" data-key="7">7</button>
            <button type="button" data-key="8">8</button>
            <button type="button" data-key="9">9</button>
            <button type="button" class="key-save" data-key="save">保存</button>
            <button type="button" data-key="00">00</button>
            <button type="button" data-key="0">0</button>
            <button type="button" data-key=".">.</button>
            <button type="button" data-key="today">今天</button>
          </div>
        </div>
        <input id="dateInput" name="date" type="hidden">
      </form>
    </section>

    <section class="sheet" id="categorySheet" aria-hidden="true" aria-labelledby="categoryManagerTitle">
      <div class="sheet-backdrop" data-close-category-sheet></div>
      <div class="sheet-panel category-panel">
        <header class="sheet-header">
          <div>
            <span id="categoryManagerKicker">快捷</span>
            <strong id="categoryManagerTitle">设置快捷</strong>
          </div>
          <button class="icon-button" type="button" data-close-category-sheet aria-label="关闭">
            <svg><use href="#icon-close"></use></svg>
          </button>
        </header>

        <div class="quick-manager-panel" id="quickManagerPanel">
          <div class="recent-manager">
            <div class="recent-manager-head">
              <span>快捷</span>
              <strong id="quickCount">0/15</strong>
            </div>
            <div class="recent-category-list" id="recentCategoryList" aria-label="快捷分类设置"></div>
          </div>

          <div class="quick-pool-section">
            <div class="recent-manager-head">
              <span>新增</span>
              <strong>从全部分类中选择</strong>
            </div>
            <div class="quick-category-pool" id="quickCategoryPool" aria-label="全部分类"></div>
          </div>

          <div class="sheet-actions category-actions quick-actions">
            <button class="secondary-button" type="button" id="addQuickCategory">添加</button>
            <button class="secondary-button danger-button" type="button" id="removeQuickCategory">删除</button>
            <button class="primary-button" type="button" id="saveQuickCategory">保存</button>
          </div>
        </div>

        <div class="category-editor-panel" id="categoryEditorPanel" hidden>
          <div class="segmented entry-type" id="categoryTypeControl" role="tablist" aria-label="分类类型">
            <button class="active" type="button" data-manager-type="expense">支出</button>
            <button type="button" data-manager-type="income">收入</button>
          </div>

          <div class="category-editor-list" id="categoryEditorList"></div>

          <label class="category-name-field">
            <span>分类名称</span>
            <input id="categoryNameInput" type="text" maxlength="12" placeholder="输入分类名称">
          </label>

          <div class="icon-picker-head">
            <span>图标</span>
            <strong>点击切换</strong>
          </div>
          <div class="icon-grid" id="iconGrid" aria-label="选择图标"></div>

          <div class="sheet-actions category-actions">
            <button class="secondary-button" type="button" id="addCategory">新增分类</button>
            <button class="primary-button" type="button" id="saveCategory">完成</button>
          </div>
        </div>
      </div>
    </section>

    <section class="modal-layer" id="noteDialog" aria-hidden="true" aria-labelledby="noteDialogTitle">
      <div class="modal-backdrop" data-close-note-dialog></div>
      <div class="note-dialog" role="dialog" aria-modal="true">
        <header class="note-dialog-head">
          <span></span>
          <strong id="noteDialogTitle">备注</strong>
          <button type="button" id="openNoteHistory">历史</button>
        </header>
        <textarea id="noteTextarea" maxlength="80" placeholder="暂无备注"></textarea>
        <button class="note-confirm" id="confirmNote" type="button">确定</button>
      </div>
    </section>

    <section class="modal-layer" id="noteHistoryDialog" aria-hidden="true" aria-labelledby="noteHistoryTitle">
      <div class="modal-backdrop" data-close-note-history></div>
      <div class="note-history-dialog" role="dialog" aria-modal="true">
        <header class="note-dialog-head">
          <button class="danger-text" id="clearNoteHistory" type="button">删除全部</button>
          <strong id="noteHistoryTitle">历史备注</strong>
          <button type="button" id="confirmNoteHistory">确定</button>
        </header>
        <div class="note-history-list" id="noteHistoryList"></div>
      </div>
    </section>

    <section class="modal-layer" id="dateDialog" aria-hidden="true" aria-labelledby="dateDialogTitle">
      <div class="modal-backdrop" data-close-date-dialog></div>
      <div class="date-dialog" role="dialog" aria-modal="true">
        <header class="date-dialog-head">
          <button class="icon-button" id="datePrevMonth" type="button" aria-label="上个月">
            <svg><use href="#icon-left"></use></svg>
          </button>
          <strong id="dateDialogTitle">选择日期</strong>
          <button class="icon-button" id="dateNextMonth" type="button" aria-label="下个月">
            <svg><use href="#icon-right"></use></svg>
          </button>
        </header>
        <div class="date-weekdays" aria-hidden="true">
          <span>日</span>
          <span>一</span>
          <span>二</span>
          <span>三</span>
          <span>四</span>
          <span>五</span>
          <span>六</span>
        </div>
        <div class="date-grid" id="dateGrid" aria-label="选择日期"></div>
        <div class="date-dialog-actions">
          <button type="button" id="dateUseToday">今天</button>
          <button type="button" id="confirmDate">确定</button>
        </div>
      </div>
    </section>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="vendor/hammer.min.js?v=29"></script>
    <script src="app.js?v=39"></script>
  </body>
</html>
